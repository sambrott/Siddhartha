<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#080f05">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>Book — Tropical Scene</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html {
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    height: 100%;
    height: -webkit-fill-available;
  }
  body {
    background: #000;
    overflow: hidden;
    width: 100%;
    max-width: 100vw;
    min-height: 100vh;
    min-height: 100dvh;
    min-height: -webkit-fill-available;
    position: fixed;
    inset: 0;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
    touch-action: none;
  }
  #bookPrompt {
    position: fixed; left: 50%;
    bottom: max(10%, env(safe-area-inset-bottom, 0px));
    transform: translateX(-50%);
    max-width: min(90vw, 28rem); padding: 12px 22px; border: 1px solid rgba(200,160,96,0.45);
    background: rgba(0,0,0,0.55); color: #e8d5a0; font-family: Georgia, serif;
    font-size: 0.88rem; letter-spacing: 0.06em; z-index: 9; pointer-events: none;
    display: none; text-align: center;
  }
  #bookPrompt.visible { display: block; }
  #soundToggle {
    position: fixed;
    top: max(14px, env(safe-area-inset-top, 0px));
    right: max(14px, env(safe-area-inset-right, 0px));
    z-index: 10;
    padding: 10px 14px;
    min-height: 44px;
    min-width: 44px;
    touch-action: manipulation;
    font-family: Georgia, serif;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(232, 213, 160, 0.5);
    background: rgba(0, 0, 0, 0.38);
    border: 1px solid rgba(200, 160, 96, 0.26);
    border-radius: 3px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  #soundToggle:hover {
    color: rgba(232, 213, 160, 0.92);
    border-color: rgba(200, 160, 96, 0.48);
    background: rgba(0, 0, 0, 0.52);
  }
  #soundToggle[aria-pressed="true"] {
    color: rgba(232, 213, 160, 0.88);
    border-color: rgba(200, 160, 96, 0.42);
  }
  #sceneExitBtn {
    display: none;
    position: fixed;
    top: max(14px, env(safe-area-inset-top, 0px));
    left: max(14px, env(safe-area-inset-left, 0px));
    z-index: 12;
    touch-action: manipulation;
    width: 48px;
    height: 48px;
    padding: 0;
    line-height: 42px;
    font-family: system-ui, sans-serif;
    font-size: 1.6rem;
    color: rgba(232, 213, 160, 0.9);
    background: rgba(0, 0, 0, 0.45);
    border: 1px solid rgba(200, 160, 96, 0.4);
    border-radius: 6px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  #sceneExitBtn.visible {
    display: flex;
  }
  #sceneExitBtn:hover {
    color: #fff8e8;
    border-color: rgba(200, 160, 96, 0.65);
    background: rgba(0, 0, 0, 0.62);
  }
  @media (max-width: 768px) {
    #bookPrompt {
      font-size: max(0.88rem, 16px);
      padding: 14px 18px;
    }
    #soundToggle {
      font-size: max(0.68rem, 13px);
    }
  }
  @media (pointer: coarse) {
    #soundToggle:active,
    #sceneExitBtn:active {
      opacity: 0.92;
    }
  }
</style>
</head>
<body>
<audio id="ambient" preload="auto" playsinline loop></audio>
<button type="button" id="soundToggle" aria-pressed="false" aria-label="Ambient sound off. Click to turn on." title="Ambient sound">Sound · off</button>
<button type="button" id="sceneExitBtn" hidden aria-label="Return to scene">×</button>
<div id="bookPrompt" aria-live="polite">Click the cover to open the book</div>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
(function () {
'use strict';
/** Resolve assets relative to this document (works on GitHub Pages and subpaths). */
function assetUrl(relativePath) {
  return new URL(relativePath, document.baseURI || document.location.href).href;
}
/** Audio: sip.m4a, Ahhhh.mp3, pouring.m4a, frog_touch.m4a (see tryPlayTeaMp3). */
function tryPlayTeaMp3(filename, volume, onFail) {
  const a = new Audio(assetUrl(filename));
  a.volume = volume != null ? volume : 1;
  const fail =
    typeof onFail === 'function'
      ? function () {
          onFail();
        }
      : function () {};
  a.addEventListener('error', fail, { once: true });
  const p = a.play();
  if (p && typeof p.then === 'function') {
    p.catch(fail);
  }
}
(function initAmbientSrc() {
  const el = document.getElementById('ambient');
  if (!el) return;
  el.src = assetUrl('coqui_sounds.mp4');
})();
if (typeof THREE === 'undefined') {
  document.body.innerHTML = '<p style="color:#c8a060;font-family:Georgia;padding:2rem;">Three.js failed to load. Check your network and refresh.</p>';
  return;
}
/* ── RENDERER (simple, reliable — not photoreal) ── */
const canvas = document.getElementById('c');
canvas.style.touchAction = 'none';

function isMobilePerfProfile() {
  try {
    return (
      window.matchMedia('(max-width: 768px)').matches ||
      (window.matchMedia('(pointer: coarse)').matches &&
        window.matchMedia('(max-width: 1024px)').matches)
    );
  } catch (e) {
    return false;
  }
}
const isMobilePerf = isMobilePerfProfile();

let renderer;
try {
  renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: !isMobilePerf,
    alpha: false,
    powerPreference: isMobilePerf ? 'low-power' : 'default',
    failIfMajorPerformanceCaveat: false,
  });
} catch (e) {
  document.body.innerHTML = '<p style="color:#c8a060;font-family:Georgia;padding:2rem;">WebGL is not available.</p>';
  return;
}
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, isMobilePerf ? 1.5 : 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = isMobilePerf ? THREE.PCFShadowMap : THREE.PCFSoftShadowMap;
renderer.physicallyCorrectLights = true;
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.35;
renderer.setClearColor(0x060e04);

const PAGE_TEX_W = 1024;
const PAGE_TEX_H = 768;
const MAX_BOOK_PAGE_SLICES = 88;
const PARAS_PER_PAGE = 10;
const PARAS_CHAPTER_FIRST_PAGE = 4;
const MAX_PRETEXT_PAGES = 172;

const BOOK_META = { title: 'Siddhartha', author: 'Hermann Hesse', year: '' };

const PT = {
  fontBody: "15px 'EB Garamond', Georgia, serif",
  fontBodyItalic: "italic 15px 'EB Garamond', Georgia, serif",
  fontDisplay: "600 11px 'Cinzel', Georgia, serif",
  fontDisplayTitle: "22px 'Cinzel', Georgia, serif",
  fontDisplayLarge: "32px 'Cinzel', Georgia, serif",
  lineHeight: 23,
  indent: 22,
  marginX: 36,
  marginY: 52,
  gutter: 14,
};
/** Bottom folio page numbers (12px × 150% = 18px). */
const FOLIO_FONT_PX = 18;

function fillParchment(ctx, w, h) {
  ctx.fillStyle = '#f7f2e8';
  ctx.fillRect(0, 0, w, h);
  for (let py = 0; py < h; py += 4) {
    ctx.strokeStyle = 'rgba(120,80,30,' + (0.014 + Math.random() * 0.022) + ')';
    ctx.beginPath();
    ctx.moveTo(0, py);
    ctx.lineTo(w, py);
    ctx.stroke();
  }
}

function buildPretextPages(chapters) {
  const pages = [];
  pages.push({ type: 'title' });
  pages.push({ type: 'toc' });
  chapters.forEach(function (ch) {
    if (pages.length % 2 === 0) pages.push({ type: 'blank' });
    const paras = String(ch.body || '')
      .split(/\n\n+/)
      .map(function (p) {
        return p.trim();
      })
      .filter(Boolean);
    if (paras.length === 0) {
      pages.push({ type: 'chapter-start', chapter: ch, bodyChunk: '', paraRange: [0, 0] });
      return;
    }
    const nFirst = Math.min(PARAS_CHAPTER_FIRST_PAGE, paras.length);
    pages.push({
      type: 'chapter-start',
      chapter: ch,
      bodyChunk: paras.slice(0, nFirst).join('\n\n'),
      paraRange: [0, nFirst],
      isFirstBodyChunk: true,
    });
    for (let i = nFirst; i < paras.length; i += PARAS_PER_PAGE) {
      const end = Math.min(i + PARAS_PER_PAGE, paras.length);
      pages.push({
        type: 'body',
        chapter: { id: ch.id, number: ch.number, title: ch.title, body: paras.slice(i, end).join('\n\n') },
        paraRange: [i, end],
        isFirstBodyChunk: i === nFirst,
      });
    }
  });
  while (pages.length % 4 !== 0) pages.push({ type: 'blank' });
  if (pages.length > MAX_PRETEXT_PAGES) {
    pages.length = MAX_PRETEXT_PAGES;
    while (pages.length % 2 !== 0) pages.push({ type: 'blank' });
  }
  return pages;
}

function getFirstNumberedPageIndex(pages) {
  return pages.findIndex(function (p) {
    return p.type === 'chapter-start';
  });
}

function isSectionHeading(s) {
  const t = String(s).trim();
  if (t.length < 2 || t.length > 80) return false;
  if (/^OM$/i.test(t)) return true;
  if (!/^[A-Z0-9\s—\-',.]+$/.test(t)) return false;
  const letters = t.replace(/[^A-Za-z]/g, '');
  return letters.length > 0 && letters === letters.toUpperCase();
}

function wrapWordsToLines(ctx, words, maxW) {
  const lines = [];
  let cur = [];
  for (let i = 0; i < words.length; i++) {
    const test = cur.length ? cur.concat([words[i]]) : [words[i]];
    const lineStr = test.join(' ');
    if (ctx.measureText(lineStr).width <= maxW || cur.length === 0) {
      cur.push(words[i]);
    } else {
      lines.push(cur);
      cur = [words[i]];
    }
  }
  if (cur.length) lines.push(cur);
  return lines;
}

function drawJustifiedLine(ctx, words, x, y, width, justify) {
  if (!words.length) return;
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'left';
  if (words.length === 1 || !justify) {
    ctx.fillText(words.join(' '), x, y);
    return;
  }
  let tw = 0;
  for (let i = 0; i < words.length; i++) tw += ctx.measureText(words[i]).width;
  tw += (words.length - 1) * ctx.measureText(' ').width;
  const extra = width - tw;
  const gaps = words.length - 1;
  const add = gaps > 0 ? extra / gaps : 0;
  let cx = x;
  for (let i = 0; i < words.length; i++) {
    ctx.fillText(words[i], cx, y);
    if (i < words.length - 1) {
      cx += ctx.measureText(words[i]).width + ctx.measureText(' ').width + add;
    }
  }
}

function drawParagraph(ctx, para, x, y, width, maxY, opts) {
  const noIndent = opts && opts.noIndent;
  const indent = noIndent ? 0 : PT.indent;
  ctx.font = PT.fontBody;
  ctx.fillStyle = '#1a1008';

  if (isSectionHeading(para)) {
    ctx.font = "600 15px 'Cinzel', Georgia, serif";
    ctx.textAlign = 'center';
    ctx.fillStyle = '#2a2016';
    ctx.fillText(para.trim(), x + width / 2, y + PT.lineHeight * 0.85);
    ctx.textAlign = 'left';
    return y + PT.lineHeight * 1.75;
  }

  if (para.indexOf('\n') >= 0) {
    const verseLines = para
      .split(/\n/)
      .map(function (s) {
        return s.trim();
      })
      .filter(Boolean);
    ctx.textAlign = 'center';
    ctx.font = PT.fontBody;
    let cy = y;
    for (let vi = 0; vi < verseLines.length; vi++) {
      if (cy + PT.lineHeight > maxY) break;
      ctx.fillText(verseLines[vi], x + width / 2, cy + PT.lineHeight * 0.85);
      cy += PT.lineHeight;
    }
    ctx.textAlign = 'left';
    return cy + PT.lineHeight * 0.4;
  }

  const words = String(para)
    .replace(/\s+/g, ' ')
    .trim()
    .split(' ')
    .filter(Boolean);
  if (!words.length) return y;

  const innerW = width - indent;
  const wordLines = wrapWordsToLines(ctx, words, innerW);
  let cy = y;
  for (let li = 0; li < wordLines.length; li++) {
    if (cy + PT.lineHeight > maxY) break;
    const wl = wordLines[li];
    const justify = li < wordLines.length - 1 && wl.length > 1;
    drawJustifiedLine(ctx, wl, x + indent, cy + PT.lineHeight * 0.85, innerW, justify);
    cy += PT.lineHeight;
  }
  return cy + PT.lineHeight * 0.35;
}

function renderPageColumn(ctx, page, pages, chapters, firstNumIdx, colRect) {
  const pageIndex = colRect.pageIndex !== undefined ? colRect.pageIndex : -1;
  const x = colRect.x;
  const y = colRect.y;
  const w = colRect.w;
  const h = colRect.h;
  const showFolio =
    pageIndex >= 0 && firstNumIdx >= 0 && pageIndex >= firstNumIdx && firstNumIdx < pages.length;
  const folioNum = showFolio ? pageIndex - firstNumIdx + 1 : 0;
  const padTop = showFolio ? 22 : 0;
  const padBot = showFolio ? Math.max(22, FOLIO_FONT_PX + 10) : 0;
  const contentTop = y + padTop;
  const contentMaxY = y + h - padBot;

  if (showFolio) {
    ctx.save();
    ctx.font = "600 10px 'Cinzel', Georgia, serif";
    ctx.fillStyle = '#aaa';
    ctx.textBaseline = 'alphabetic';
    if (pageIndex % 2 === 0) {
      ctx.textAlign = 'left';
      ctx.fillText(BOOK_META.author, x + PT.marginX, y + 14);
    } else {
      ctx.textAlign = 'right';
      ctx.fillText(BOOK_META.title, x + w - PT.marginX, y + 14);
    }
    ctx.restore();
  }

  if (page.type === 'title') {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#2a2016';
    ctx.font = PT.fontDisplayLarge;
    ctx.fillText(BOOK_META.title, x + w / 2, y + 72);
    ctx.font = "italic 18px 'EB Garamond', Georgia, serif";
    ctx.fillStyle = '#666';
    ctx.fillText(BOOK_META.author, x + w / 2, y + 118);
    ctx.strokeStyle = '#c8a96e';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + w / 2 - 32, y + 142);
    ctx.lineTo(x + w / 2 + 32, y + 142);
    ctx.stroke();
    if (BOOK_META.year) {
      ctx.font = "12px 'EB Garamond', Georgia, serif";
      ctx.fillStyle = '#999';
      ctx.fillText(BOOK_META.year, x + w / 2, y + 168);
    }
    ctx.textAlign = 'left';
    drawFolioNumber(ctx, x, y, w, h, pageIndex, showFolio, folioNum);
    return;
  }

  if (page.type === 'toc') {
    ctx.textAlign = 'center';
    ctx.font = PT.fontDisplayTitle;
    ctx.fillStyle = '#2a2016';
    ctx.fillText('Contents', x + w / 2, y + 28);
    ctx.textAlign = 'left';
    ctx.font = PT.fontBody;
    let ty = y + 64;
    chapters.forEach(function (ch) {
      const startIdx = pages.findIndex(function (p) {
        return p.type === 'chapter-start' && p.chapter && p.chapter.id === ch.id;
      });
      const num =
        startIdx >= 0 && firstNumIdx <= startIdx ? String(startIdx - firstNumIdx + 1) : '—';
      const title = ch.title || 'Untitled';
      ctx.fillStyle = '#1a1008';
      const leftPart = title + ' ';
      ctx.fillText(leftPart, x + PT.marginX, ty + PT.lineHeight * 0.85);
      const lw = ctx.measureText(leftPart).width;
      const numW = ctx.measureText(num).width;
      const endX = x + w - PT.marginX - numW;
      ctx.strokeStyle = '#bbb';
      ctx.setLineDash([2, 3]);
      ctx.beginPath();
      ctx.moveTo(x + PT.marginX + lw + 4, ty + PT.lineHeight * 0.5);
      ctx.lineTo(endX - 6, ty + PT.lineHeight * 0.5);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.textAlign = 'right';
      ctx.fillText(num, x + w - PT.marginX, ty + PT.lineHeight * 0.85);
      ctx.textAlign = 'left';
      ty += Math.round(PT.lineHeight * 1.38);
    });
    drawFolioNumber(ctx, x, y, w, h, pageIndex, showFolio, folioNum);
    return;
  }

  if (page.type === 'blank') {
    drawFolioNumber(ctx, x, y, w, h, pageIndex, showFolio, folioNum);
    return;
  }

  if (page.type === 'chapter-start') {
    const ch = page.chapter;
    const innerH = contentMaxY - contentTop;
    const openerH = Math.floor(innerH * 0.58);
    const bodyTop = contentTop + openerH;
    let ty = contentTop;
    ctx.textAlign = 'center';
    ctx.font = "52px 'Cinzel', Georgia, serif";
    ctx.fillStyle = '#c8a96e';
    ctx.fillText('\u2767', x + w / 2, ty + 44);
    if (ch.number) {
      ctx.font = "600 22px 'Cinzel', Georgia, serif";
      ctx.fillStyle = '#888';
      ctx.fillText(String(ch.number).toUpperCase(), x + w / 2, ty + 96);
    }
    ctx.font = "44px 'Cinzel', Georgia, serif";
    ctx.fillStyle = '#2a2016';
    ctx.fillText(ch.title || '', x + w / 2, ty + 164);
    if (ch.epigraph) {
      ctx.font = PT.fontBodyItalic;
      ctx.fillStyle = '#666';
      const ew = ch.epigraph.split(/\s+/).filter(Boolean);
      const epLines = wrapWordsToLines(ctx, ew, w - PT.marginX * 2);
      let ey = ty + 224;
      for (let ei = 0; ei < epLines.length; ei++) {
        drawJustifiedLine(ctx, epLines[ei], x + PT.marginX, ey + PT.lineHeight * 0.85, w - PT.marginX * 2, false);
        ey += PT.lineHeight;
      }
    }
    ctx.textAlign = 'left';
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath();
    ctx.moveTo(x + PT.marginX, bodyTop);
    ctx.lineTo(x + w - PT.marginX, bodyTop);
    ctx.stroke();
    let by = bodyTop + 10;
    const chunk = page.bodyChunk || '';
    const paras = chunk.split(/\n\n+/).map(function (p) {
      return p.trim();
    }).filter(Boolean);
    for (let pi = 0; pi < paras.length; pi++) {
      if (by > contentMaxY - PT.lineHeight) break;
      by = drawParagraph(ctx, paras[pi], x, by, w, contentMaxY, { noIndent: pi === 0 });
    }
    drawFolioNumber(ctx, x, y, w, h, pageIndex, showFolio, folioNum);
    return;
  }

  if (page.type === 'body') {
    const ch = page.chapter;
    const paras = String(ch.body || '')
      .split(/\n\n+/)
      .map(function (p) {
        return p.trim();
      })
      .filter(Boolean);
    let cy = contentTop;
    for (let pi = 0; pi < paras.length; pi++) {
      if (cy > contentMaxY - PT.lineHeight) break;
      cy = drawParagraph(ctx, paras[pi], x, cy, w, contentMaxY, {
        noIndent: page.isFirstBodyChunk && pi === 0,
      });
    }
    drawFolioNumber(ctx, x, y, w, h, pageIndex, showFolio, folioNum);
  }
}

/** Bottom folio (Pretext .page-number). */
function drawFolioNumber(ctx, x, y, w, h, pageIndex, showFolio, folioNum) {
  if (!showFolio || !folioNum) return;
  ctx.save();
  ctx.font = FOLIO_FONT_PX + "px 'EB Garamond', Georgia, serif";
  ctx.fillStyle = '#888';
  ctx.textBaseline = 'alphabetic';
  const bottomY = y + h - FOLIO_FONT_PX;
  if (pageIndex % 2 === 0) {
    ctx.textAlign = 'left';
    ctx.fillText(String(folioNum), x + PT.marginX, bottomY);
  } else {
    ctx.textAlign = 'right';
    ctx.fillText(String(folioNum), x + w - PT.marginX, bottomY);
  }
  ctx.restore();
}

function makeSpreadCanvasTexture(
  renderer,
  leftPage,
  rightPage,
  pages,
  chapters,
  firstNumIdx,
  leftPageIndex,
  rightPageIndex
) {
  const cv = document.createElement('canvas');
  cv.width = PAGE_TEX_W;
  cv.height = PAGE_TEX_H;
  const ctx = cv.getContext('2d');
  fillParchment(ctx, PAGE_TEX_W, PAGE_TEX_H);
  const half = PAGE_TEX_W / 2;
  const g = PT.gutter;
  const mx = PT.marginX;
  ctx.strokeStyle = 'rgba(90, 55, 22, 0.12)';
  ctx.beginPath();
  ctx.moveTo(half, PT.marginY * 0.35);
  ctx.lineTo(half, PAGE_TEX_H - PT.marginY * 0.35);
  ctx.stroke();
  const colH = PAGE_TEX_H - PT.marginY * 2;
  renderPageColumn(ctx, leftPage, pages, chapters, firstNumIdx, {
    x: mx,
    y: PT.marginY,
    w: half - mx - g / 2,
    h: colH,
    pageIndex: leftPageIndex,
  });
  renderPageColumn(ctx, rightPage, pages, chapters, firstNumIdx, {
    x: half + g / 2,
    y: PT.marginY,
    w: half - mx - g / 2,
    h: colH,
    pageIndex: rightPageIndex,
  });
  const tex = new THREE.CanvasTexture(cv);
  tex.encoding = THREE.sRGBEncoding;
  tex.anisotropy = Math.min(8, renderer.capabilities.getMaxAnisotropy());
  return tex;
}

function buildSpreadTexturesFromChapters(chapters, renderer) {
  const pages = buildPretextPages(chapters);
  const firstNumIdx = getFirstNumberedPageIndex(pages);
  const textures = [];
  for (let si = 0; si < pages.length; si += 2) {
    if (textures.length >= MAX_BOOK_PAGE_SLICES) break;
    const left = pages[si];
    const right = pages[si + 1] || { type: 'blank' };
    textures.push(
      makeSpreadCanvasTexture(renderer, left, right, pages, chapters, firstNumIdx, si, si + 1)
    );
  }
  return textures;
}

function disposeTextureArray(arr) {
  arr.forEach(function (tex) {
    if (tex && tex.dispose) tex.dispose();
  });
}

function disposePagePlaneMaps() {
  if (leftPageMat.map) {
    leftPageMat.map.dispose();
    leftPageMat.map = null;
  }
  if (rightPageMat.map) {
    rightPageMat.map.dispose();
    rightPageMat.map = null;
  }
}

function applyBarrelBulge(geometry, height, strength) {
  const pos = geometry.attributes.position;
  const halfH = height * 0.5;
  for (let i = 0; i < pos.count; i++) {
    const y = pos.getY(i);
    const t = (y + halfH) / height;
    const f = 1 + strength * Math.sin(Math.PI * Math.max(0, Math.min(1, t)));
    pos.setX(i, pos.getX(i) * f);
    pos.setZ(i, pos.getZ(i) * f);
  }
  pos.needsUpdate = true;
  geometry.computeVertexNormals();
}

const COQUI_CYCLE = 120;
const COQUI_IN = 1.05;
const COQUI_STAY = 5;
const COQUI_OUT = 0.68;
const COQUI_GLIDE = 2.5;
const COQUI_EXIT = COQUI_IN + COQUI_STAY + COQUI_OUT;
const COQUI_ACTIVE = COQUI_EXIT + COQUI_GLIDE;
const COQUI_TABLE_TOP_Y = 0.06;
const COQUI_FOOT_Y = COQUI_TABLE_TOP_Y + 0.008;
const COQUI_ARC_PEAK = 0.42;
const COQUI_TARGET_MAX_DIM = 1.45 / 3;

const coquiJumpInStart = new THREE.Vector3(-2.95, -0.24, -0.55);
const coquiLand = new THREE.Vector3(-2.02, COQUI_FOOT_Y, -1.36);
const coquiJumpOutEnd = new THREE.Vector3(-7.55, -0.32, -3.05);
const coquiPeakOut = COQUI_ARC_PEAK * 0.94;
const COQUI_GRAV = 14.5;
const coquiFallV0 = new THREE.Vector3(
  (coquiJumpOutEnd.x - coquiLand.x) / COQUI_OUT,
  (coquiJumpOutEnd.y - coquiLand.y - 4 * coquiPeakOut) / COQUI_OUT,
  (coquiJumpOutEnd.z - coquiLand.z) / COQUI_OUT,
);

const coquiGroup = new THREE.Group();
coquiGroup.visible = false;
let coquiRig = null;

const coquiYawIn = Math.atan2(
  coquiLand.x - coquiJumpInStart.x,
  coquiLand.z - coquiJumpInStart.z,
);
const coquiYawOut = Math.atan2(
  coquiJumpOutEnd.x - coquiLand.x,
  coquiJumpOutEnd.z - coquiLand.z,
);

function loadCoquiGltf() {
  if (typeof THREE.GLTFLoader === 'undefined') {
    console.warn('GLTFLoader missing — add GLTFLoader script for frog.glb');
    return;
  }
  const loader = new THREE.GLTFLoader();
  loader.load(
    assetUrl('frog.glb'),
    function (gltf) {
      const model = gltf.scene;
      const cubeNodes = [];
      model.traverse(function (child) {
        if (!child.name) return;
        if (child.name === '_Cube_0' || /cube/i.test(child.name)) {
          cubeNodes.push(child);
        }
      });
      cubeNodes.forEach(function (node) {
        if (!node.parent) return;
        node.parent.remove(node);
        node.traverse(function (ch) {
          if (ch.isMesh) {
            if (ch.geometry) ch.geometry.dispose();
            const m = ch.material;
            if (m) {
              if (Array.isArray(m)) m.forEach(function (mat) { mat.dispose(); });
              else m.dispose();
            }
          }
        });
      });
      model.traverse(function (child) {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z, 1e-6);
      const s = COQUI_TARGET_MAX_DIM / maxDim;
      model.scale.setScalar(s);
      model.updateMatrixWorld(true);
      const box2 = new THREE.Box3().setFromObject(model);
      model.position.y = -box2.min.y;
      const cx = (box2.min.x + box2.max.x) * 0.5;
      const cz = (box2.min.z + box2.max.z) * 0.5;
      model.position.x -= cx;
      model.position.z -= cz;
      model.rotation.y += Math.PI;

      const squash = new THREE.Group();
      const pitch = new THREE.Group();
      squash.add(pitch);
      pitch.add(model);
      squash.scale.setScalar(1);
      coquiGroup.add(squash);

      coquiRig = {
        squash,
        pitch,
        model,
        baseScale: 1,
        legs: null,
        head: null,
        eyeL: null,
        eyeR: null,
      };
    },
    undefined,
    function (err) {
      console.warn('frog.glb failed to load', err);
    },
  );
}
loadCoquiGltf();

function coquiJumpPoint(u, a, b, peak) {
  const x = a.x + (b.x - a.x) * u;
  const z = a.z + (b.z - a.z) * u;
  const yBase = a.y + (b.y - a.y) * u;
  const yArc = 4 * u * (1 - u) * peak;
  coquiGroup.position.set(x, yBase + yArc, z);
}

function coquiJumpPitchRad(u, a, b, peak) {
  const dx = b.x - a.x;
  const dz = b.z - a.z;
  const dy = b.y - a.y + 4 * peak * (1 - 2 * u);
  const horiz = Math.sqrt(dx * dx + dz * dz) || 0.001;
  return Math.atan2(dy, horiz);
}

function smoothstep(edge0, edge1, x) {
  const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
  return t * t * (3 - 2 * t);
}

/** True while the frog is sitting on the table (idle phase), not jumping in/out. */
function isCoquiIdleOnTable() {
  if (!coquiRig || !coquiGroup.visible) return false;
  const phase = clock.getElapsedTime() % COQUI_CYCLE;
  return phase >= COQUI_IN && phase < COQUI_IN + COQUI_STAY;
}

function playFrogTouchSound() {
  tryPlayTeaMp3('frog_touch.m4a', 1, function () {});
}

function updateCoquiFrog(elapsed, easeIo) {
  if (!coquiRig) return;
  const phase = elapsed % COQUI_CYCLE;
  if (phase >= COQUI_ACTIVE) {
    coquiGroup.visible = false;
    return;
  }
  coquiGroup.visible = true;

  const R = coquiRig;
  const S = R.baseScale;
  const setSquash = function (airAmount, impact) {
    const a = Math.max(0, Math.min(1, airAmount));
    const im = impact || 0;
    const sy = 1 - a * 0.1 + im * 0.12;
    const sxz = 1 + a * 0.06 - im * 0.05;
    R.squash.scale.set(sxz * S, sy * S, sxz * S);
  };

  const applyLegs = function (frontX, backX, spread) {
    if (!R.legs) return;
    const sp = spread || 0;
    R.legs.forEach(function (leg) {
      leg.pivot.rotation.x = leg.isFront ? frontX : backX;
      leg.pivot.rotation.z = leg.pivot.position.x < 0 ? -sp : sp;
    });
  };

  if (phase < COQUI_IN) {
    const t = phase / COQUI_IN;
    const u = easeIo(t);
    coquiJumpPoint(u, coquiJumpInStart, coquiLand, COQUI_ARC_PEAK);
    const pitchT = coquiJumpPitchRad(u, coquiJumpInStart, coquiLand, COQUI_ARC_PEAK);
    R.pitch.rotation.x = THREE.MathUtils.clamp(pitchT * 0.92, -0.55, 0.48);
    const crouch = smoothstep(0.22, 0, u) * 0.85;
    const launch =
      smoothstep(0.08, 0.28, u) * (1 - smoothstep(0.38, 0.58, u));
    const flight = Math.sin(Math.PI * u) * 0.55;
    const backLeg = -0.35 - crouch * 0.45 + launch * 0.5 + flight * 0.4;
    const frontLeg = -0.15 - crouch * 0.55 + launch * 0.35 + flight * 0.25;
    applyLegs(frontLeg, backLeg, 0.04 + crouch * 0.08);
    const wobble = Math.sin(u * Math.PI);
    setSquash(wobble, u > 0.92 ? (u - 0.92) / 0.08 : 0);
    coquiGroup.rotation.y = coquiYawIn * (1 - u);
    coquiGroup.rotation.z = (1 - u) * 0.12;
    if (R.eyeL && R.eyeR) {
      R.eyeL.scale.y = R.eyeR.scale.y = 1;
    }
    if (R.head) {
      R.head.rotation.y = 0;
      R.head.rotation.z = Math.sin(u * Math.PI * 2) * 0.06;
    }
  } else if (phase < COQUI_IN + COQUI_STAY) {
    const idle = phase - COQUI_IN;
    coquiGroup.position.copy(coquiLand);
    R.pitch.rotation.x = Math.sin(idle * 2.2) * 0.035;
    const breath = Math.sin(idle * 2.8) * 0.018;
    setSquash(0, 0);
    R.squash.scale.y = S * (1 + breath);
    R.squash.scale.x = R.squash.scale.z = S * (1 - breath * 0.35);
    applyLegs(-0.22, -0.38, 0.06 + Math.sin(idle * 1.9) * 0.03);
    coquiGroup.rotation.y = Math.sin(idle * 0.7) * 0.08;
    coquiGroup.rotation.z = Math.sin(idle * 3.1) * 0.04;
    coquiGroup.position.y = coquiLand.y + Math.sin(idle * 2.6) * 0.004;
    if (R.head) {
      R.head.rotation.y = Math.sin(idle * 1.1) * 0.07;
      R.head.rotation.z = Math.sin(idle * 2.4) * 0.05;
    }
    if (R.eyeL && R.eyeR) {
      const blinkT = idle % 4.2;
      const blink = blinkT > 3.15 && blinkT < 3.28 ? 0.12 : 1;
      R.eyeL.scale.y = blink;
      R.eyeR.scale.y = blink;
    }
  } else if (phase < COQUI_EXIT) {
    const t = (phase - COQUI_IN - COQUI_STAY) / COQUI_OUT;
    const u = Math.min(1, Math.max(0, t));
    coquiJumpPoint(u, coquiLand, coquiJumpOutEnd, coquiPeakOut);
    const pitchT = coquiJumpPitchRad(u, coquiLand, coquiJumpOutEnd, coquiPeakOut);
    R.pitch.rotation.x = THREE.MathUtils.clamp(pitchT * 0.95, -0.62, 0.52);
    const prep = smoothstep(0, 0.18, u);
    const flight = Math.sin(Math.PI * u) * 0.58;
    const backLeg = -0.32 + prep * 0.55 + flight * 0.55;
    const frontLeg = -0.18 + prep * 0.45 + flight * 0.35;
    applyLegs(frontLeg, backLeg, 0.05);
    setSquash(Math.sin(u * Math.PI), u < 0.1 ? (0.1 - u) / 0.1 * 0.4 : 0);
    coquiGroup.rotation.y = coquiYawOut * u;
    coquiGroup.rotation.z = u * 0.14;
    if (R.head) {
      R.head.rotation.y = 0;
      R.head.rotation.z = -Math.sin(u * Math.PI) * 0.05;
    }
    if (R.eyeL && R.eyeR) {
      R.eyeL.scale.y = R.eyeR.scale.y = 1;
    }
  } else {
    const tf = phase - COQUI_EXIT;
    const p0 = coquiJumpOutEnd;
    const v0 = coquiFallV0;
    const g = COQUI_GRAV;
    coquiGroup.position.set(
      p0.x + v0.x * tf,
      p0.y + v0.y * tf - 0.5 * g * tf * tf,
      p0.z + v0.z * tf,
    );
    const vx = v0.x;
    const vy = v0.y - g * tf;
    const vz = v0.z;
    const horizSp = Math.sqrt(vx * vx + vz * vz) || 0.001;
    R.pitch.rotation.x = THREE.MathUtils.clamp(
      Math.atan2(vy, horizSp) * 0.94,
      -0.78,
      0.72,
    );
    setSquash(0, 0);
    coquiGroup.rotation.y = coquiYawOut;

function applyTeaSipVisual() {
  const d = teaSipCount;
  if (d === 0) {
    teaSurface.visible = true;
    teaBottomInner.visible = true;
    teaSurface.position.y = teaSurfaceBaseY;
    teaBottomInner.position.y = teaBottomInnerBaseY;
    teaLiquidMat.opacity = 0.93;
    return;
  }
  if (d < 3) {
    teaSurface.visible = true;
    teaBottomInner.visible = true;
    const drop = d === 1 ? TEA_SIP_DROP_1 : TEA_SIP_DROP_2;
    teaSurface.position.y = teaSurfaceBaseY - drop;
    teaBottomInner.position.y = teaBottomInnerBaseY - drop * 0.55;
    teaLiquidMat.opacity = d === 1 ? 0.68 : 0.38;
    return;
  }
  teaSurface.visible = false;
  teaBottomInner.visible = false;
  teaLiquidMat.opacity = 0;
}

/** Refill animation: t=0 empty (like third sip), t=1 full cup. Pace matches pouring.m4a duration. */
function applyTeaRefillVisual(t) {
  const e = THREE.MathUtils.clamp(t, 0, 1);
  const dropMax = TEA_SIP_DROP_2 + 0.02;
  if (e < 1e-5) {
    teaSurface.visible = false;
    teaBottomInner.visible = false;
    teaLiquidMat.opacity = 0;
    return;
  }
  const drop = dropMax * (1 - e);
  teaSurface.visible = true;
  teaBottomInner.visible = true;
  teaSurface.position.y = teaSurfaceBaseY - drop;
  teaBottomInner.position.y = teaBottomInnerBaseY - drop * 0.55;
  teaLiquidMat.opacity = THREE.MathUtils.lerp(0, 0.93, e);
}

function finishTeaRefill() {
  if (!teaRefillInProgress) return;
  teaRefillInProgress = false;
  teaSipCount = 0;
  teaSteam.visible = true;
  steamMat.opacity = 0.32;
  applyTeaSipVisual();
  if (teaPouringAudio) {
    try {
      teaPouringAudio.pause();
    } catch (err) {}
    teaPouringAudio = null;
  }
}

function updateTeaRefillAnimation() {
  if (!teaRefillInProgress) return;
  let progress = 0;
  const a = teaPouringAudio;
  if (a && a.duration && isFinite(a.duration) && a.duration > 0.05) {
    progress = Math.min(1, a.currentTime / a.duration);
  } else {
    const elapsed = (performance.now() - teaRefillStartMs) / 1000;
    progress = Math.min(1, elapsed / Math.max(0.05, teaRefillDuration));
  }
  applyTeaRefillVisual(progress);
  if (progress >= 1) finishTeaRefill();
}

function startTeaRefill() {
  if (teaRefillInProgress) return;
  teaRefillInProgress = true;
  teaRefillDuration = 2.5;
  teaSteam.visible = false;
  applyTeaRefillVisual(0);
  const a = new Audio(assetUrl('pouring.m4a'));
  a.volume = 1;
  teaPouringAudio = a;
  function applyDuration() {
    if (a.duration && isFinite(a.duration) && a.duration > 0.05) {
      teaRefillDuration = a.duration;
    }
  }
  if (a.readyState >= 1) applyDuration();
  else a.addEventListener('loadedmetadata', applyDuration, { once: true });
  a.addEventListener(
    'ended',
    function () {
      if (!teaRefillInProgress) return;
      finishTeaRefill();
    },
    { once: true }
  );
  teaRefillStartMs = performance.now();
  const p = a.play();
  if (p && typeof p.then === 'function') {
    p.catch(function () {});
  }
}

function playTeaSipSoundFallback() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const len = Math.floor(ctx.sampleRate * 0.09);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (len * 0.25));
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const bp = ctx.createBiquadFilter();
    bp.type = 'lowpass';
    bp.frequency.setValueAtTime(1100, ctx.currentTime);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.62, ctx.currentTime + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.09);
    src.connect(bp);
    bp.connect(g);
    g.connect(ctx.destination);
    src.start();
    src.stop(ctx.currentTime + 0.1);
  } catch (e) {
    console.warn('Tea sip sound failed', e);
  }
}

/** Sip only: louder than HTML5 max (1); Ahhhh stays at tryPlayTeaMp3(..., 1). */
const TEA_SIP_GAIN = 1.55;
let teaSipAudioCtx = null;
function getTeaSipAudioContext() {
  if (!teaSipAudioCtx) {
    teaSipAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return teaSipAudioCtx;
}

function playTeaSipSound() {
  try {
    const ctx = getTeaSipAudioContext();
    if (ctx.state === 'suspended') {
      ctx.resume();
    }
    const a = new Audio(assetUrl('sip.m4a'));
    a.volume = 1;
    const src = ctx.createMediaElementSource(a);
    const gain = ctx.createGain();
    gain.gain.value = TEA_SIP_GAIN;
    src.connect(gain);
    gain.connect(ctx.destination);
    function cleanup() {
      try {
        src.disconnect();
        gain.disconnect();
      } catch (e) {}
    }
    a.addEventListener('ended', cleanup, { once: true });
    a.addEventListener(
      'error',
      function () {
        cleanup();
        tryPlayTeaMp3('sip.m4a', 1, playTeaSipSoundFallback);
      },
      { once: true }
    );
    const p = a.play();
    if (p && typeof p.catch === 'function') {
      p.catch(function () {
        cleanup();
        tryPlayTeaMp3('sip.m4a', 1, playTeaSipSoundFallback);
      });
    }
  } catch (e) {
    tryPlayTeaMp3('sip.m4a', 1, playTeaSipSoundFallback);
  }
}

function pickMaleVoice() {
  const voices = window.speechSynthesis ? speechSynthesis.getVoices() : [];
  let v =
    voices.find(function (x) {
      return /male|daniel|fred|david|mark|alex|en-gb|en-us.*male/i.test(x.name + ' ' + (x.lang || ''));
    }) || null;
  if (!v) {
    v = voices.find(function (x) {
      return /^en/i.test(x.lang || '');
    });
  }
  return v || voices[0] || null;
}

function playTeaSatisfactionSoundFallback() {
  try {
    if (!window.speechSynthesis) return;
    const speak = function () {
      const u = new SpeechSynthesisUtterance('aaaah');
      u.rate = 0.78;
      u.pitch = 0.45;
      u.volume = 0.92;
      const v = pickMaleVoice();
      if (v) u.voice = v;
      speechSynthesis.speak(u);
    };
    if (speechSynthesis.getVoices().length) speak();
    else speechSynthesis.addEventListener('voiceschanged', speak, { once: true });
  } catch (e) {
    console.warn('Tea satisfaction voice failed', e);
  }
}

function playTeaSatisfactionSound() {
  tryPlayTeaMp3('Ahhhh.mp3', 1, playTeaSatisfactionSoundFallback);
}

function handleTeaSip() {
  if (teaRefillInProgress) return;
  if (teaSipCount >= 3) {
    startTeaRefill();
    return;
  }
  teaSipCount++;
  if (teaSipCount === 3) {
    playTeaSatisfactionSound();
    teaSteam.visible = false;
  } else {
    playTeaSipSound();
  }
  applyTeaSipVisual();
}

for(let i=0;i<FC;i++){
  ffPos[i*3]=(Math.random()-0.5)*14;
  ffPos[i*3+1]=Math.random()*5-1;
  ffPos[i*3+2]=(Math.random()-0.5)*10;
  ffPh[i]=Math.random()*Math.PI*2;
}
const ffGeo=new THREE.BufferGeometry();
ffGeo.setAttribute('position',new THREE.BufferAttribute(ffPos,3));
const ffMat=new THREE.PointsMaterial({color:0xc8ff50,size:0.065,transparent:true,opacity:0.8});
const ff=new THREE.Points(ffGeo,ffMat);
scene.add(ff);

const clock = new THREE.Clock();
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

let interactionMode = 'scene';
let bookFloatEnabled = true;
let openProgress = 0;
let cameraAnim = 0;
const CAM_TO_BOOK_DURATION = 1.35;
const camStartPos = new THREE.Vector3();
const camTargetPos = new THREE.Vector3();
const camStartTgt = new THREE.Vector3();
const camTargetTgt = new THREE.Vector3();
const camCurTgt = new THREE.Vector3();
const tmpDir = new THREE.Vector3();
const SPINE_LOCAL = new THREE.Vector3(-0.765, 0.04, 0);
const spineWorld = new THREE.Vector3();
const camOffScratch = new THREE.Vector3();
/** Reading pose: move camera ~20% closer when the book is open (lerp with openProgress). */
const CAM_READING_ZOOM = 1.38;
const CAM_OFFSET_SPREAD = new THREE.Vector3(0, 4.35, 0.05);

function spineWorldPoint(out) {
  bGroup.updateMatrixWorld(true);
  return out.copy(SPINE_LOCAL).applyMatrix4(bGroup.matrixWorld);
}

let isOpeningBook = false;
let openSoundPlayed = false;
const BOOK_OPEN_SPEED = 0.58;
let spreadIndex = 0;
let MAX_SPREADS = 1;
let pageTurnHintDismissed = false;

/** × exit: reverse zoom + close cover at same speeds as entering / opening. */
let isReturningToScene = false;
let returnCamSnapMode = '';
let returnTableZoomU = 0;
let returnCamElapsed = 0;
let returnCamDone = false;
const returnFromBookPos = new THREE.Vector3();
const returnFromBookLookAt = new THREE.Vector3();

function easeInOut(t) {
  return t * t * (3 - 2 * t);
}

function playBookOpenSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const master = ctx.createGain();
    master.gain.setValueAtTime(0.0001, ctx.currentTime);
    master.gain.exponentialRampToValueAtTime(0.14, ctx.currentTime + 0.02);
    master.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.42);
    master.connect(ctx.destination);

    const len = Math.floor(ctx.sampleRate * 0.35);
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    let n = 0;
    for (let i = 0; i < len; i++) {
      n = n * 0.96 + (Math.random() * 2 - 1) * 0.08;
      d[i] = n * (1 - i / len);
    }
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const bp = ctx.createBiquadFilter();
    bp.type = 'lowpass';
    bp.frequency.setValueAtTime(2200, ctx.currentTime);
    bp.frequency.exponentialRampToValueAtTime(420, ctx.currentTime + 0.28);
    src.connect(bp);
    bp.connect(master);
    src.start();

    const creak = ctx.createOscillator();
    creak.type = 'triangle';
    creak.frequency.setValueAtTime(180, ctx.currentTime);
    creak.frequency.exponentialRampToValueAtTime(95, ctx.currentTime + 0.22);
    const cg = ctx.createGain();
    cg.gain.setValueAtTime(0.0001, ctx.currentTime);
    cg.gain.exponentialRampToValueAtTime(0.06, ctx.currentTime + 0.015);
    cg.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.32);
    creak.connect(cg);
    cg.connect(master);
    creak.start();
    creak.stop(ctx.currentTime + 0.35);
  } catch (e) {
    console.warn('Book open sound failed', e);
  }
}

function setPointer(ev) {
  const rect = canvas.getBoundingClientRect();
  pointer.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
}

function startCameraToBook() {
  if (interactionMode !== 'scene') return;
  interactionMode = 'cameraToBook';
  bookFloatEnabled = false;
  bGroup.position.y = BOOK_GROUP_Y;
  camStartPos.copy(camera.position);
  camera.getWorldDirection(tmpDir);
  camStartTgt.copy(camera.position).add(tmpDir.multiplyScalar(6));
  spineWorldPoint(spineWorld);
  camTargetTgt.copy(spineWorld);
  camTargetPos.copy(spineWorld).add(CAM_OFFSET_SPREAD);
  cameraAnim = 0;
  const prompt = document.getElementById('bookPrompt');
  if (prompt) prompt.classList.remove('visible');
}

function updateBookFromProgress() {
  const p = THREE.MathUtils.clamp(openProgress, 0, 1);
  const s = easeInOut(p);
  coverPivot.rotation.z = s * COVER_OPEN_ANGLE;
  bGroup.rotation.y = BOOK_START_ROT_Y * (1 - s);
  titlePivot.rotation.z = 0;
  const shX = coverOpenPxRight * COVER_PX_TO_WORLD_X;
  const shY = -coverOpenPxDown * COVER_PX_TO_WORLD_Y;
  const shZ = coverOpenPxZ * COVER_PX_TO_WORLD_Z;
  bTop.position.x = COVER_BOARD_WIDTH / 2 + s * shX;
  bTop.position.y = s * shY;
  bTop.position.z = s * shZ;
}

function finishReturnToSceneView() {
  interactionMode = 'scene';
  bookFloatEnabled = true;
  cameraAnim = 0;
  isOpeningBook = false;
  openProgress = 0;
  spreadIndex = 0;
  pageTurnHintDismissed = false;
  openSoundPlayed = false;
  bGroup.position.y = BOOK_GROUP_Y;
  bGroup.rotation.y = BOOK_START_ROT_Y;
  updateBookFromProgress();
  applySpreadTextures();
  camera.position.copy(SCENE_CAMERA_POS);
  camera.lookAt(SCENE_LOOK_AT);
  teaSipCount = 0;
  teaRefillInProgress = false;
  if (teaPouringAudio) {
    try {
      teaPouringAudio.pause();
    } catch (e) {}
    teaPouringAudio = null;
  }
  teaSteam.visible = true;
  steamMat.opacity = 0.32;
  applyTeaSipVisual();
  const prompt = document.getElementById('bookPrompt');
  if (prompt) {
    prompt.textContent = 'Click the cover to open the book';
    prompt.classList.remove('visible');
  }
  const exitBtn = document.getElementById('sceneExitBtn');
  if (exitBtn) {
    exitBtn.classList.remove('visible');
    exitBtn.hidden = true;
  }
  isReturningToScene = false;
  returnCamDone = false;
}

function updateReturnToScene(dt) {
  if (!returnCamDone) {
    returnCamElapsed += dt;
    if (returnCamSnapMode === 'cameraToBook') {
      const camDur = Math.max(0.08, returnTableZoomU * CAM_TO_BOOK_DURATION);
      const t = Math.min(1, returnCamElapsed / camDur);
      const e = easeInOut(t);
      const u = returnTableZoomU * (1 - e);
      const le = easeInOut(u);
      camera.position.lerpVectors(camStartPos, camTargetPos, le);
      camCurTgt.lerpVectors(camStartTgt, camTargetTgt, le);
      camera.lookAt(camCurTgt);
      if (t >= 1) returnCamDone = true;
    } else if (returnCamSnapMode === 'readyToOpen' || returnCamSnapMode === 'reading') {
      const camDur = CAM_TO_BOOK_DURATION;
      const t = Math.min(1, returnCamElapsed / camDur);
      const e = easeInOut(t);
      camera.position.lerpVectors(returnFromBookPos, SCENE_CAMERA_POS, e);
      camCurTgt.lerpVectors(returnFromBookLookAt, SCENE_LOOK_AT, e);
      camera.lookAt(camCurTgt);
      if (t >= 1) returnCamDone = true;
    } else {
      returnCamDone = true;
    }
  } else {
    camera.position.copy(SCENE_CAMERA_POS);
    camera.lookAt(SCENE_LOOK_AT);
  }

  if (openProgress > 0) {
    openProgress = Math.max(0, openProgress - dt * BOOK_OPEN_SPEED);
    updateBookFromProgress();
    applySpreadTextures();
  }

  if (returnCamDone && openProgress <= 0) {
    finishReturnToSceneView();
  }
}

/** × button: animate back to the opening table (reverse zoom + close cover). */
function startReturnToScene() {
  if (interactionMode === 'scene' || isReturningToScene) return;
  isOpeningBook = false;
  returnCamSnapMode = interactionMode;
  returnCamElapsed = 0;
  returnCamDone = false;
  if (interactionMode === 'cameraToBook') {
    returnTableZoomU = Math.min(1, cameraAnim);
  } else if (interactionMode === 'readyToOpen' || interactionMode === 'reading') {
    returnFromBookPos.copy(camera.position);
    spineWorldPoint(spineWorld);
    returnFromBookLookAt.copy(spineWorld);
  }
  if (teaRefillInProgress) {
    teaRefillInProgress = false;
    if (teaPouringAudio) {
      try {
        teaPouringAudio.pause();
      } catch (e) {}
      teaPouringAudio = null;
    }
    teaSipCount = 0;
    teaSteam.visible = true;
    steamMat.opacity = 0.32;
    applyTeaSipVisual();
  }
  isReturningToScene = true;
  interactionMode = 'returningToScene';
}

(function initSceneExitButton() {
  const btn = document.getElementById('sceneExitBtn');
  if (!btn) return;
  btn.addEventListener('click', function (ev) {
    ev.preventDefault();
    ev.stopPropagation();
    startReturnToScene();
  });
})();

function hitIsCoverMesh(o) {
  let p = o;
  while (p) {
    if (p === coverPivot) return true;
    if (p.userData && p.userData.isBookCover) return true;
    p = p.parent;
  }
  return false;
}

function changeSpread(delta) {
  const next = spreadIndex + delta;
  if (next < 0 || next >= MAX_SPREADS) return;
  spreadIndex = next;
  applySpreadTextures();
  pageTurnHintDismissed = true;
  const prompt = document.getElementById('bookPrompt');
  if (prompt) prompt.classList.remove('visible');
}

function applySpreadTextures() {
  const si = spreadIndex;
  const open = openProgress >= 0.999;
  titleMat.map = spreadTexMaps[si];
  titleMat.needsUpdate = true;
  titlePage.visible = false;
  disposePagePlaneMaps();
  const base = spreadTexMaps[si];
  const leftTex = base.clone();
  leftTex.repeat.set(0.5, 1);
  leftTex.offset.set(0, 0);
  const rightTex = base.clone();
  rightTex.repeat.set(0.5, 1);
  rightTex.offset.set(0.5, 0);
  leftPageMat.map = leftTex;
  rightPageMat.map = rightTex;
  leftPageMat.needsUpdate = true;
  rightPageMat.needsUpdate = true;
  leftPagePlane.visible = open;
  rightPagePlane.visible = open;
}

canvas.addEventListener('pointerdown', (ev) => {
  if (isReturningToScene) return;
  setPointer(ev);
  raycaster.setFromCamera(pointer, camera);

  const teaHitsGlobal = raycaster.intersectObjects(teaPickMeshes, false);
  if (teaHitsGlobal.length > 0) {
    ev.preventDefault();
    handleTeaSip();
    return;
  }

  if (interactionMode === 'scene') {
    if (isCoquiIdleOnTable()) {
      const frogHits = raycaster.intersectObjects([coquiGroup], true);
      if (frogHits.length > 0) {
        ev.preventDefault();
        playFrogTouchSound();
        return;
      }
    }
    const sceneHits = raycaster.intersectObjects([bGroup], true);
    if (sceneHits.length > 0) {
      ev.preventDefault();
      startCameraToBook();
    }
    return;
  }

  if (interactionMode === 'readyToOpen' || interactionMode === 'reading') {
    if (isCoquiIdleOnTable()) {
      const frogHits = raycaster.intersectObjects([coquiGroup], true);
      if (frogHits.length > 0) {
        ev.preventDefault();
        playFrogTouchSound();
        return;
      }
    }
    const coverHits = raycaster.intersectObjects([coverPivot], true);
    if (coverHits.length > 0 && !isOpeningBook && openProgress < 0.999) {
      ev.preventDefault();
      isOpeningBook = true;
      if (!openSoundPlayed) {
        openSoundPlayed = true;
        playBookOpenSound();
      }
      const prompt = document.getElementById('bookPrompt');
      if (prompt) prompt.classList.remove('visible');
      return;
    }

    if (openProgress >= 1 && !isOpeningBook) {
      const hits = raycaster.intersectObjects([bGroup], true);
      if (hits.length > 0) {
        const o = hits[0].object;
        if (hitIsCoverMesh(o)) return;
        ev.preventDefault();
        const pageHits = raycaster.intersectObjects([leftPagePlane, rightPagePlane], false);
        if (pageHits.length > 0) {
          if (pageHits[0].object === leftPagePlane) changeSpread(-1);
          else changeSpread(1);
          return;
        }
        if (pointer.x < 0) changeSpread(-1);
        else changeSpread(1);
      }
    }
  }
});

applySpreadTextures();
loadPretextPages();

/* ── AMBIENT: looped MP4 (audio track), toggled via #soundToggle ── */
const AMBIENT_TARGET_VOL = 0.35;
const STORAGE_AMBIENT = 'siddhartha_ambient_on';

function fadeInAmbient(ambient, targetVol) {
  const start = performance.now();
  const fadeMs = 900;
  function fadeIn() {
    const t = Math.min(1, (performance.now() - start) / fadeMs);
    ambient.volume = targetVol * t;
    if (t < 1) requestAnimationFrame(fadeIn);
  }
  requestAnimationFrame(fadeIn);
}

function startAudio() {
  const ambient = document.getElementById('ambient');
  if (!ambient) return Promise.reject(new Error('no ambient element'));
  if (!ambient.src) {
    ambient.src = assetUrl('coqui_sounds.mp4');
  }
  ambient.loop = true;
  if (!ambient.paused) {
    fadeInAmbient(ambient, AMBIENT_TARGET_VOL);
    return Promise.resolve();
  }
  function afterPlay() {
    try {
      sessionStorage.setItem('coqui_audio_ok', '1');
    } catch (e) {
      /* ignore */
    }
    fadeInAmbient(ambient, AMBIENT_TARGET_VOL);
  }
  function tryPlay() {
    ambient.volume = 0;
    const p = ambient.play();
    if (p && typeof p.then === 'function') {
      return p.then(afterPlay);
    }
    afterPlay();
    return Promise.resolve();
  }
  function onMediaError() {
    console.warn('Ambient <audio> load error', ambient.error);
  }
  if (!ambient.error) {
    ambient.addEventListener('error', onMediaError, { once: true });
  }
  if (ambient.readyState >= 2) {
    return tryPlay().catch(function (err) {
      console.warn('Ambient playback failed', err);
      throw err;
    });
  }
  return new Promise(function (resolve, reject) {
    function cleanup() {
      ambient.removeEventListener('canplay', onReady);
      ambient.removeEventListener('error', onFail);
    }
    function onReady() {
      cleanup();
      tryPlay()
        .then(resolve)
        .catch(function (err) {
          console.warn('Ambient playback failed', err);
          reject(err);
        });
    }
    function onFail() {
      cleanup();
      onMediaError();
      reject(new Error('ambient media load failed'));
    }
    ambient.addEventListener('canplay', onReady, { once: true });
    ambient.addEventListener('error', onFail, { once: true });
    try {
      ambient.load();
    } catch (e) {
      /* ignore */
    }
  });
}

function stopAmbient() {
  const ambient = document.getElementById('ambient');
  if (!ambient) return;
  ambient.pause();
  ambient.volume = 0;
}

function syncSoundToggleUi(on) {
  const btn = document.getElementById('soundToggle');
  if (!btn) return;
  btn.setAttribute('aria-pressed', on ? 'true' : 'false');
  btn.setAttribute('aria-label', on ? 'Ambient sound on. Click to turn off.' : 'Ambient sound off. Click to turn on.');
  btn.textContent = on ? 'Sound · on' : 'Sound · off';
  btn.title = on ? 'Mute ambient sound' : 'Play ambient sound';
}

function writeAmbientPref(on) {
  try {
    localStorage.setItem(STORAGE_AMBIENT, on ? '1' : '0');
  } catch (e) {
    /* ignore */
  }
}

(function initSoundToggle() {
  const btn = document.getElementById('soundToggle');
  if (!btn) return;
  syncSoundToggleUi(false);
  btn.addEventListener('click', function (ev) {
    ev.preventDefault();
    ev.stopPropagation();
    const pressed = btn.getAttribute('aria-pressed') === 'true';
    if (pressed) {
      stopAmbient();
      writeAmbientPref(false);
      syncSoundToggleUi(false);
    } else {
      startAudio()
        .then(function () {
          writeAmbientPref(true);
          syncSoundToggleUi(true);
        })
        .catch(function () {
          syncSoundToggleUi(false);
        });
    }
  });
})();

(function initAmbientOnFirstClick() {
  function onFirstPointerDown() {
    document.removeEventListener('pointerdown', onFirstPointerDown, true);
    startAudio()
      .then(function () {
        writeAmbientPref(true);
        syncSoundToggleUi(true);
      })
      .catch(function () {});
  }
  document.addEventListener('pointerdown', onFirstPointerDown, { capture: true });
})();

/* ── ANIMATE ── */
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(0.08, clock.getDelta());
  const t = clock.getElapsedTime();

  updateTeaRefillAnimation();

  if (isReturningToScene) {
    updateReturnToScene(dt);
  } else if (isOpeningBook) {
    openProgress = Math.min(1, openProgress + dt * BOOK_OPEN_SPEED);
    updateBookFromProgress();
    if (openProgress >= 1) {
      openProgress = 1;
      updateBookFromProgress();
      isOpeningBook = false;
    }
  }

  if (
    !isReturningToScene &&
    interactionMode === 'readyToOpen' &&
    openProgress >= 1 &&
    !isOpeningBook
  ) {
    interactionMode = 'reading';
    applySpreadTextures();
    const prompt = document.getElementById('bookPrompt');
    if (prompt && !pageTurnHintDismissed) {
      prompt.textContent = 'Click to turn the page';
      prompt.classList.add('visible');
    }
  }

  const sceneExitBtn = document.getElementById('sceneExitBtn');
  if (sceneExitBtn) {
    const showExit = interactionMode !== 'scene' && !isReturningToScene;
    sceneExitBtn.classList.toggle('visible', showExit);
    sceneExitBtn.hidden = !showExit;
  }

  if (!isReturningToScene && !bookFloatEnabled) {
    spineWorldPoint(spineWorld);
    if (interactionMode === 'cameraToBook') {
      camTargetTgt.copy(spineWorld);
      camTargetPos.copy(spineWorld).add(CAM_OFFSET_SPREAD);
      cameraAnim += dt / CAM_TO_BOOK_DURATION;
      const u = Math.min(1, cameraAnim);
      const e = easeInOut(u);
      camera.position.lerpVectors(camStartPos, camTargetPos, e);
      camCurTgt.lerpVectors(camStartTgt, camTargetTgt, e);
      camera.lookAt(camCurTgt);
      if (u >= 1) {
        interactionMode = 'readyToOpen';
        const prompt = document.getElementById('bookPrompt');
        if (prompt) prompt.classList.add('visible');
      }
    } else if (interactionMode === 'readyToOpen' || interactionMode === 'reading') {
      const camZoom = THREE.MathUtils.lerp(1, 1 / CAM_READING_ZOOM, openProgress);
      camOffScratch.copy(CAM_OFFSET_SPREAD).multiplyScalar(camZoom);
      camera.position.copy(spineWorld).add(camOffScratch);
      camera.lookAt(spineWorld);
    }
  }
  spot.target.position.copy(bGroup.position);

  // Fireflies
  const fp = ff.geometry.attributes.position.array;
  for(let i=0;i<FC;i++){
    fp[i*3+1] += Math.sin(t*0.7+ffPh[i])*0.002;
    fp[i*3]   += Math.cos(t*0.45+ffPh[i]*1.3)*0.001;
  }
  ff.geometry.attributes.position.needsUpdate = true;
  ffMat.opacity = 0.45 + Math.sin(t*2.0)*0.35;

  if (teaSteam.visible) {
    const sp = teaSteam.geometry.attributes.position.array;
    const rise = 0.16;
    const drift = 0.022;
    for (let i = 0; i < STEAM_N; i++) {
      const ph = (t * 0.28 + steamPh[i]) % 1;
      const spread = 1 + ph * 0.55;
      const wobble = Math.sin(t * 1.4 + steamPh[i] * 6.28) * drift * ph;
      const wobble2 = Math.cos(t * 1.1 + i * 0.7) * drift * ph * 0.6;
      const a = steamAng[i] + ph * 0.65 + Math.sin(t * 0.5 + i) * 0.08;
      const r = steamRad[i] * spread;
      sp[i * 3] = Math.cos(a) * r + wobble;
      sp[i * 3 + 1] = teaSurface.position.y + 0.006 + ph * rise;
      sp[i * 3 + 2] = Math.sin(a) * r + wobble2;
    }
    teaSteam.geometry.attributes.position.needsUpdate = true;
    steamMat.opacity = 0.14 + Math.sin(t * 0.9 + 0.3) * 0.06;
  }

  if (bookFloatEnabled) {
    bGroup.position.y = BOOK_GROUP_Y + Math.sin(t*0.38)*0.004;
  }

  // Palm sway
  palms.forEach((p,i) => {
    p.rotation.z = Math.sin(t*0.5 + i*0.8) * 0.035;
    p.rotation.x = Math.sin(t*0.3 + i*0.5) * 0.012;
  });

  updateCoquiFrog(t, easeInOut);

  renderer.render(scene, camera);
}
animate();

/* ── RESIZE (inner + visual viewport for mobile browser chrome) ── */
function applyViewportToRenderer() {
  const vv = window.visualViewport;
  const w = vv ? vv.width : window.innerWidth;
  const h = vv ? vv.height : window.innerHeight;
  const mobile = isMobilePerfProfile();
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, mobile ? 1.5 : 2));
  renderer.setSize(w, h);
  camera.aspect = w / Math.max(h, 1);
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', applyViewportToRenderer);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', applyViewportToRenderer);
}
applyViewportToRenderer();
})();
